services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5431}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME_PRODUCTION: ${DB_NAME_PRODUCTION}
      DB_NAME_TEST: ${DB_NAME_TEST}
      SOLID_QUEUE_IN_PUMA: ${SOLID_QUEUE_IN_PUMA:-true}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH:-login}
      MAILER_HOST: ${MAILER_HOST}
      MAILER_PORT: ${MAILER_PORT:-443}
      MAIL_FROM: ${MAIL_FROM}
      LAB_NAME: ${LAB_NAME:-LABORATORIUM}
    volumes:
      - lisa_storage:/rails/storage
    restart: unless-stopped

volumes:
  lisa_storage:
  postgres_data:
