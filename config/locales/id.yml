        other: "terlalu panjang (maksimal %{count} karakter)"
      too_short:
        one: "terlalu pendek (minimal 1 karakter)"
        other: "terlalu pendek (minimal %{count} karakter)"
      wrong_length:
        one: "panjang tidak sesuai (harus 1 karakter)"
        other: "panjang tidak sesuai (harus %{count} karakter)"

