        taken: "sudah terdaftar"
        blank: "tidak boleh kosong"
        too_short: "terlalu pendek (minimal %{count} karakter)"
        too_long: "terlalu panjang (maksimal %{count} karakter)"
        invalid: "tidak valid"
        inclusion: "tidak termasuk dalam daftar yang valid"

  # ── Active Model ──────────────────────────────────────────────────────────────
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: "harus diterima"
      blank: "tidak boleh kosong"
      present: "harus kosong"
      confirmation: "tidak sesuai dengan %{attribute}"
