id:
  app_name: "LISA"
  app_tagline: "Sistem Informasi Laboratorium"

  # ── Date & Time ──────────────────────────────────────────────────────────────
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d %b %Y"
      long: "%d %B %Y"
      sidebar: "%A, %-d %B %Y"
    month_names:
      - ~
      - Januari
      - Februari
      - Maret
      - April
      - Mei
      - Juni
      - Juli
      - Agustus
      - September
      - Oktober
      - November
      - Desember
    abbr_month_names:
      - ~
      - Jan
      - Feb
      - Mar
      - Apr
      - Mei
      - Jun
      - Jul
      - Agu
      - Sep
      - Okt
      - Nov
      - Des
    day_names:
      - Minggu
      - Senin
      - Selasa
      - Rabu
      - Kamis
      - Jumat
      - Sabtu
    abbr_day_names:
      - Min
      - Sen
      - Sel
      - Rab
      - Kam
      - Jum
      - Sab

  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d %b %Y %H:%M"
      short_with_year: "%H:%M, %d %b %Y"
      long: "%d %B %Y pukul %H:%M"
    am: "pagi"
    pm: "sore"

  # ── Number & Currency ────────────────────────────────────────────────────────
  number:
    format:
      separator: ","
      delimiter: "."
      precision: 2

  # ── Active Record ─────────────────────────────────────────────────────────────
  activerecord:
    models:
      user: "Pengguna"
      role: "Peran"
      specimen: "Spesimen"
      work: "Pekerjaan"
      examination: "Pemeriksaan"
      examination_result: "Hasil Pemeriksaan"
      reference_rule: "Aturan Referensi"
    attributes:
      user:
        name: "Nama"
        email: "Email"
        password: "Kata sandi"
        password_confirmation: "Konfirmasi kata sandi"
        active: "Aktif"
      role:
        name: "Nama peran"
      specimen:
        patient_id: "ID Pasien"
        patient_name: "Nama Pasien"
        birth_date: "Tanggal Lahir"
        gender: "Jenis Kelamin"
        lab_id: "ID Lab"
        order_number: "Nomor Order"
        status: "Status"
        medical_record_id: "No. Rekam Medis"
        department: "Departemen"
        collection_datetime: "Waktu Pengambilan"
        referring_doctor: "Dokter Pengirim"
        affiliation: "Affiliasi"
        patient_address: "Alamat Pasien"
        responsible_doctor: "Dr. Penanggung Jawab"
